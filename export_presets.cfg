[preset.0]

name="Windows Desktop"
platform="Windows Desktop"
runnable=true
dedicated_server=false
custom_features=""
export_filter="all_resources"
include_filter=""
exclude_filter="dev_tests/*,mod_examples/*,mods/*,DLC/*,.godot/*,mod_docs/*,build/*,build.bat,运行游戏.bat,README.md,LICENSE,*.csproj,*.sln"
encryption_include_filters=""
encryption_exclude_filters=""

[preset.0.options]

custom_template/debug=""
custom_template/release=""
binary_format/embed_pck=false
binary_format/architecture="x86_64"
binary_format/export_mode=2
codesign/enable=false
codesign/identity=""
codesign/password=""
codesign/timestamp=true
codesign/timestamp_md5=false
application/modify_resolution=true
application/icon=""
application/console_wrapper_icon=""
application/console_wrapper_icon_edit=""
application/console_wrapper_icon_edit_text=""
application/file_version=""
application/product_version=""
application/company_name=""
application/product_name=""
application/file_description=""
application/copyright=""
application/trademarks=""
ssh_remote_deploy/enabled=true
ssh_remote_deploy/host="localhost"
ssh_remote_deploy/port="22"
ssh_remote_deploy/extra_args="ssh -tt"
ssh_remote_deploy/run_script="powershell Start-Process -WindowStyle Hidden -FilePath \`"{{exe_path}}\`" -ArgumentList \`"{{exe_args}}\`""
ssh_remote_deploy/clean_script=""
dotnet/include_scripts_content=false
