<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 圆形暗红底 -->
  <circle cx="16" cy="16" r="14" fill="#600000" stroke="#a08020" stroke-width="1.5"/>

  <!-- 剑1 (左→右斜) -->
  <g transform="rotate(45 16 16)">
    <rect x="14.5" y="4" width="3" height="18" rx="0.5" fill="#c8c8d0" stroke="#a0a0a8" stroke-width="0.3"/>
    <!-- 剑刃高光 -->
    <rect x="15.5" y="4" width="1" height="18" fill="#ffffff" opacity="0.3"/>
    <!-- 剑尖 -->
    <polygon points="14.5,4 17.5,4 16,1" fill="#e0e0e8" stroke="#a0a0a8" stroke-width="0.3"/>
    <!-- 剑格 -->
    <rect x="12" y="18" width="1" height="3" fill="#a08020"/>
    <rect x="19" y="18" width="1" height="3" fill="#a08020"/>
    <rect x="13" y="18" width="6" height="1.5" fill="#c0a030" stroke="#a08020" stroke-width="0.3"/>
    <!-- 剑柄 -->
    <rect x="15" y="20" width="2" height="5" rx="0.3" fill="#302010"/>
    <!-- 剑穗 -->
    <path d="M16,25 Q14,26 13,28" fill="none" stroke="#cc2020" stroke-width="0.8"/>
    <path d="M16,25 Q18,26 19,28" fill="none" stroke="#cc2020" stroke-width="0.8"/>
  </g>

  <!-- 剑2 (右→左斜) -->
  <g transform="rotate(-45 16 16)">
    <rect x="14.5" y="4" width="3" height="18" rx="0.5" fill="#b8b8c8" stroke="#9090a0" stroke-width="0.3"/>
    <rect x="15.5" y="4" width="1" height="18" fill="#ffffff" opacity="0.2"/>
    <polygon points="14.5,4 17.5,4 16,1" fill="#d8d8e0" stroke="#9090a0" stroke-width="0.3"/>
    <rect x="12" y="18" width="1" height="3" fill="#a08020"/>
    <rect x="19" y="18" width="1" height="3" fill="#a08020"/>
    <rect x="13" y="18" width="6" height="1.5" fill="#c0a030" stroke="#a08020" stroke-width="0.3"/>
    <rect x="15" y="20" width="2" height="5" rx="0.3" fill="#302010"/>
    <path d="M16,25 Q14,26 13,28" fill="none" stroke="#cc2020" stroke-width="0.8"/>
    <path d="M16,25 Q18,26 19,28" fill="none" stroke="#cc2020" stroke-width="0.8"/>
  </g>

  <!-- 交叉点闪电 -->
  <path d="M14,14 L15,16 L13,16 L16,19" fill="none" stroke="#80c0ff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M17,13 L16,15 L18,15 L16,17" fill="none" stroke="#80c0ff" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
