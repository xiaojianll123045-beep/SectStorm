<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 圆形翠玉底 -->
  <circle cx="16" cy="16" r="14" fill="#408060" stroke="#d4a436" stroke-width="1.5"/>

  <!-- 左元宝 -->
  <path d="M6,18 Q8,12 12,18 Q10,20 6,18 Z" fill="#e0d8d0" stroke="#b0a898" stroke-width="0.5"/>
  <path d="M6,18 Q8,16 12,18" fill="none" stroke="#c0b0a0" stroke-width="0.3"/>
  <!-- 元宝宝光 -->
  <ellipse cx="9" cy="16" rx="1.5" ry="0.8" fill="#ffffff" opacity="0.3"/>

  <!-- 右元宝 -->
  <path d="M20,18 Q22,12 26,18 Q24,20 20,18 Z" fill="#e0d8d0" stroke="#b0a898" stroke-width="0.5"/>
  <path d="M20,18 Q22,16 26,18" fill="none" stroke="#c0b0a0" stroke-width="0.3"/>
  <ellipse cx="23" cy="16" rx="1.5" ry="0.8" fill="#ffffff" opacity="0.3"/>

  <!-- 箭头环 (左→右→左) -->
  <path d="M13,14 Q16,10 19,14" fill="none" stroke="#ffd700" stroke-width="1" stroke-linecap="round"/>
  <!-- 右箭头 -->
  <polygon points="19,14 17,12 17,16" fill="#ffd700"/>
  <!-- 回箭头 -->
  <path d="M19,18 Q16,22 13,18" fill="none" stroke="#ffd700" stroke-width="1" stroke-linecap="round"/>
  <polygon points="13,18 15,20 15,16" fill="#ffd700"/>

  <!-- 铜钱点缀 -->
  <circle cx="16" cy="6" r="2" fill="none" stroke="#ffd700" stroke-width="0.6"/>
  <rect x="15.5" y="5.5" width="1" height="1" fill="#408060"/>
</svg>
