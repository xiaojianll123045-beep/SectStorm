  <path d="M24,8 Q34,12 36,20 Q38,30 30,36 Q22,40 16,34 Q10,26 14,18 Q18,8 24,8" fill="none" stroke="#e0c0ff" stroke-width="0.5" opacity="0.3"/>
  <path d="M24,12 Q30,14 32,20 Q34,28 28,32 Q22,36 18,30 Q14,24 18,18 Q20,12 24,12" fill="none" stroke="#ffffff" stroke-width="0.4" opacity="0.2"/>

  <!-- 核心 -->
  <circle cx="24" cy="24" r="5" fill="url(#core)"/>
  <circle cx="24" cy="24" r="3" fill="#ffffff" opacity="0.8"/>

  <!-- 八卦装饰(四点) -->
  <circle cx="24" cy="8" r="1" fill="#ffd700" opacity="0.6"/>
  <circle cx="24" cy="40" r="1" fill="#ffd700" opacity="0.6"/>
  <circle cx="8" cy="24" r="1" fill="#ffd700" opacity="0.6"/>
  <circle cx="40" cy="24" r="1" fill="#ffd700" opacity="0.6"/>
  <circle cx="13" cy="13" r="0.8" fill="#ffd700" opacity="0.4"/>
  <circle cx="35" cy="35" r="0.8" fill="#ffd700" opacity="0.4"/>
  <circle cx="13" cy="35" r="0.8" fill="#ffd700" opacity="0.4"/>
  <circle cx="35" cy="13" r="0.8" fill="#ffd700" opacity="0.4"/>

  <!-- 灵气飘散 -->
  <circle cx="6" cy="10" r="0.6" fill="#c0a0ff" opacity="0.4"/>
  <circle cx="42" cy="8" r="0.7" fill="#c0a0ff" opacity="0.3"/>
  <circle cx="40" cy="42" r="0.6" fill="#c0a0ff" opacity="0.3"/>
