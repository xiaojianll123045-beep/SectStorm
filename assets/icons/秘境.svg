<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="portal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="15%" stop-color="#e0c0ff" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#8040e0" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#401080" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#200060" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#c0a0ff"/>
      <stop offset="100%" stop-color="#8040e0"/>
