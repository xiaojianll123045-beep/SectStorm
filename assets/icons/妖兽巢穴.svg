<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="eye_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2020" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 山体/岩壁 -->
  <path d="M2,44 L2,24 Q4,10 14,6 Q22,4 28,8 Q36,6 44,14 L44,44 Z" fill="#3a3028" stroke="#2a2018" stroke-width="1"/>

  <!-- 洞口 (狗啃状) -->
  <path d="M10,44 L10,30 Q8,24 14,20 Q18,16 22,18 Q26,14 32,18 Q36,20 38,26 L38,44 Z" fill="#0a0604"/>

  <!-- 洞内更深阴影 -->
  <path d="M14,44 L14,30 Q12,26 18,22 Q22,20 26,22 Q30,20 34,26 L34,44 Z" fill="#000000"/>

  <!-- 岩石棱角纹理 -->
  <path d="M4,28 Q8,26 10,22" stroke="#504038" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M40,30 Q36,26 34,20" stroke="#504038" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M14,8 Q18,12 20,16" stroke="#504038" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M30,10 Q32,14 34,18" stroke="#504038" stroke-width="0.8" stroke-linecap="round"/>

  <!-- 岩石顶凸起 -->
  <path d="M8,22 Q10,18 16,16" fill="none" stroke="#4a3830" stroke-width="1"/>
  <path d="M28,16 Q34,14 38,20" fill="none" stroke="#4a3830" stroke-width="1"/>

  <!-- 红眼(在洞内深处) -->
  <circle cx="20" cy="28" r="5" fill="url(#eye_glow)"/>
  <circle cx="28" cy="28" r="5" fill="url(#eye_glow)"/>

  <!-- 左眼 -->
  <ellipse cx="20" cy="28" rx="2.5" ry="2" fill="#ff0000"/>
  <ellipse cx="20" cy="28" rx="1.2" ry="2" fill="#ff3030"/>
  <circle cx="20" cy="27" r="0.5" fill="#ffffff" opacity="0.7"/>

  <!-- 右眼 -->
  <ellipse cx="28" cy="28" rx="2.5" ry="2" fill="#ff0000"/>
  <ellipse cx="28" cy="28" rx="1.2" ry="2" fill="#ff3030"/>
  <circle cx="28" cy="27" r="0.5" fill="#ffffff" opacity="0.7"/>

  <!-- 爪痕 -->
  <path d="M5,32 L10,28" stroke="#5a4030" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M5,34 L11,31" stroke="#5a4030" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M43,30 L38,26" stroke="#5a4030" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M43,32 L39,29" stroke="#5a4030" stroke-width="0.8" stroke-linecap="round"/>

  <!-- 地面碎石 -->
  <circle cx="8" cy="42" r="1" fill="#4a3830"/>
  <circle cx="36" cy="40" r="1.2" fill="#4a3830"/>
  <circle cx="16" cy="44" r="0.8" fill="#4a3830"/>
  <circle cx="30" cy="44" r="0.6" fill="#4a3830"/>
</svg>
