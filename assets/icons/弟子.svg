  <!-- 令牌主体 -->
  <rect x="10" y="7" width="12" height="18" rx="2" fill="#c0d8c8" stroke="#80a890" stroke-width="0.8"/>

  <!-- 令牌顶部云纹 -->
  <path d="M10,9 Q12,7 16,9 Q20,7 22,9" fill="#a0c8b0" stroke="#80a890" stroke-width="0.4"/>

  <!-- 令牌文字 "弟" 简化 -->
