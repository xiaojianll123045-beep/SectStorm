  <line x1="16" y1="10" x2="16" y2="18" stroke="#406050" stroke-width="0.8"/>
  <line x1="14" y1="18" x2="18" y2="18" stroke="#406050" stroke-width="0.6"/>

  <!-- 令牌底部孔 -->
