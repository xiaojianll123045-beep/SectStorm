<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="glow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#40c0ff" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#2080e0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2080e0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 灵气光晕 -->
  <circle cx="24" cy="18" r="22" fill="url(#glow)"/>

  <!-- 台阶 -->
  <rect x="10" y="41" width="28" height="2" rx="0.3" fill="#c0b8a8"/>
  <rect x="7" y="43" width="34" height="2" rx="0.3" fill="#b0a898"/>
  <rect x="4" y="45" width="40" height="3" rx="0.3" fill="#a09888"/>

  <!-- 左柱 -->
  <rect x="14" y="16" width="5" height="26" rx="0.8" fill="#c03535" stroke="#902020" stroke-width="0.6"/>

  <!-- 右柱 -->
  <rect x="29" y="16" width="5" height="26" rx="0.8" fill="#c03535" stroke="#902020" stroke-width="0.6"/>

  <!-- 柱础 -->
  <rect x="13" y="40" width="7" height="2" rx="0.3" fill="#d0c8b8" stroke="#a09888" stroke-width="0.3"/>
  <rect x="28" y="40" width="7" height="2" rx="0.3" fill="#d0c8b8" stroke="#a09888" stroke-width="0.3"/>

  <!-- 横梁(下) -->
  <rect x="13" y="30" width="22" height="3" rx="0.3" fill="#208080" stroke="#106060" stroke-width="0.4"/>

  <!-- 横梁(上) -->
  <rect x="13" y="20" width="22" height="3" rx="0.3" fill="#208080" stroke="#106060" stroke-width="0.4"/>

  <!-- 牌匾 -->
  <rect x="17" y="24" width="14" height="5" rx="0.5" fill="#3a2010" stroke="#1a0e05" stroke-width="0.3"/>
  <circle cx="21" cy="26.5" r="0.6" fill="#d4a030"/>
  <circle cx="24" cy="26.5" r="0.6" fill="#d4a030"/>
  <circle cx="27" cy="26.5" r="0.6" fill="#d4a030"/>

  <!-- 屋顶主体 (直线歇山顶, 小图标更清晰) -->
  <polygon points="8,16 24,3 40,16" fill="#d4a030" stroke="#b08020" stroke-width="0.8" stroke-linejoin="round"/>

  <!-- 屋顶瓦面分层 -->
  <polygon points="10,16 24,5 38,16" fill="#e0b840" stroke="none"/>
  <polygon points="12,16 24,7 36,16" fill="#e8c850" stroke="none"/>

  <!-- 屋顶下缘 (檐口) -->
  <path d="M8,16 Q16,18 24,16 Q32,18 40,16" fill="none" stroke="#b08020" stroke-width="1.2"/>

  <!-- 正脊装饰 -->
  <line x1="22" y1="3" x2="26" y2="3" stroke="#ffd040" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 屋脊宝珠 -->
  <circle cx="24" cy="3" r="1.5" fill="#ffd040" stroke="#d4a030" stroke-width="0.4"/>

  <!-- 飞檐翘角 -->
  <path d="M8,16 Q6,15 5,13" fill="none" stroke="#d4a030" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M40,16 Q42,15 43,13" fill="none" stroke="#d4a030" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 柱头斗拱示意 -->
  <rect x="13" y="16" width="22" height="2" rx="0.3" fill="#306060" opacity="0.6"/>
</svg>
