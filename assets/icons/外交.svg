<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- 圆形玉底 -->
  <circle cx="16" cy="16" r="14" fill="#e8e0d0" stroke="#d4a436" stroke-width="1.5"/>

  <!-- 左卷轴 -->
  <rect x="5" y="10" width="8" height="14" rx="1" fill="#f0e8d8" stroke="#c0a880" stroke-width="0.5"/>
  <!-- 左卷轴上下轴 -->
  <rect x="5" y="9" width="8" height="2" rx="0.5" fill="#a08050" stroke="#806830" stroke-width="0.3"/>
  <rect x="5" y="23" width="8" height="2" rx="0.5" fill="#a08050" stroke="#806830" stroke-width="0.3"/>
  <!-- 左卷轴字迹 -->
  <line x1="7" y1="13" x2="11" y2="13" stroke="#806040" stroke-width="0.4"/>
  <line x1="7" y1="15" x2="11" y2="15" stroke="#806040" stroke-width="0.4"/>
  <line x1="7" y1="17" x2="11" y2="17" stroke="#806040" stroke-width="0.4"/>
  <line x1="7" y1="19" x2="10" y2="19" stroke="#806040" stroke-width="0.4"/>

  <!-- 右卷轴 -->
  <rect x="19" y="10" width="8" height="14" rx="1" fill="#f0e8d8" stroke="#c0a880" stroke-width="0.5"/>
  <rect x="19" y="9" width="8" height="2" rx="0.5" fill="#a08050" stroke="#806830" stroke-width="0.3"/>
  <rect x="19" y="23" width="8" height="2" rx="0.5" fill="#a08050" stroke="#806830" stroke-width="0.3"/>
  <line x1="21" y1="13" x2="25" y2="13" stroke="#806040" stroke-width="0.4"/>
  <line x1="21" y1="15" x2="25" y2="15" stroke="#806040" stroke-width="0.4"/>
  <line x1="21" y1="17" x2="25" y2="17" stroke="#806040" stroke-width="0.4"/>
  <line x1="21" y1="19" x2="24" y2="19" stroke="#806040" stroke-width="0.4"/>

  <!-- 中央印章 -->
  <circle cx="16" cy="16" r="4.5" fill="#cc3030" stroke="#aa2020" stroke-width="0.5"/>
  <!-- 印章文字 "合" 简化 -->
  <path d="M14,15 L18,15 M16,13 L16,19" fill="none" stroke="#ffd060" stroke-width="0.6"/>
  <rect x="14" y="16" width="4" height="1.5" rx="0.2" fill="none" stroke="#ffd060" stroke-width="0.4"/>
</svg>
