<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <rect x="0" y="0" width="96" height="96" fill="#8a8278"/>

  <!-- 围墙 -->
  <rect x="8" y="30" width="80" height="46" rx="1" fill="none" stroke="#909080" stroke-width="1"/>

  <!-- 左药棚 -->
  <rect x="10" y="40" width="18" height="24" rx="0.5" fill="#d0c0a8"/>
  <polygon points="8,42 16,34 30,42" fill="#505038" stroke="#383828" stroke-width="0.4"/>
  <rect x="14" y="50" width="4" height="5" fill="#3a2010" opacity="0.5"/>

  <!-- 右药棚 -->
  <rect x="68" y="40" width="18" height="24" rx="0.5" fill="#d0c0a8"/>
  <polygon points="72,42 80,34 88,42" fill="#505038" stroke="#383828" stroke-width="0.4"/>
  <rect x="78" y="50" width="4" height="5" fill="#3a2010" opacity="0.5"/>

  <!-- 主殿台基 -->
  <rect x="24" y="34" width="48" height="40" rx="1" fill="#c0b8a8" stroke="#a8a090" stroke-width="0.6"/>

  <!-- 屋 -->
  <rect x="28" y="36" width="40" height="32" rx="0.5" fill="#c8b090" stroke="#a89070" stroke-width="0.5"/>

  <!-- 柱 -->
  <rect x="28" y="36" width="2.5" height="32" fill="#a08060"/>
  <rect x="65.5" y="36" width="2.5" height="32" fill="#a08060"/>

  <!-- 大丹炉 -->
  <circle cx="48" cy="54" r="10" fill="#806040" stroke="#604830" stroke-width="0.6"/>
  <circle cx="48" cy="54" r="7" fill="#907050"/>
  <circle cx="48" cy="54" r="5" fill="#a08060"/>
  <ellipse cx="48" cy="46" rx="5" ry="2" fill="#604830"/>
  <ellipse cx="48" cy="46" rx="3" ry="1.5" fill="#ff8020" opacity="0.7"/>
  <rect x="43" y="62" width="2" height="4" fill="#604830"/>
  <rect x="53" y="62" width="2" height="4" fill="#604830"/>

  <!-- 烟囱 -->
  <rect x="46" y="24" width="4" height="14" rx="0.5" fill="#705848"/>

  <!-- 彩烟 -->
  <path d="M48,22 Q44,18 48,14 Q52,10 48,6" fill="none" stroke="#ff6040" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>
  <path d="M48,22 Q52,18 48,14 Q44,10 48,6" fill="none" stroke="#40a0ff" stroke-width="2" opacity="0.2" stroke-linecap="round"/>
  <path d="M48,22 Q48,18 48,14 Q48,10 48,6" fill="none" stroke="#80ff60" stroke-width="1.5" opacity="0.15" stroke-linecap="round"/>

  <!-- 下檐 -->
  <path d="M16,36 L28,22 L68,22 L80,36 Q74,34 70,38 L26,38 Q22,34 16,36 Z" fill="#505038" stroke="#383828" stroke-width="0.6"/>
  <!-- 上檐 -->
  <path d="M22,26 L30,14 L66,14 L74,26 Q68,24 64,28 L32,28 Q28,24 22,26 Z" fill="#404028" stroke="#282818" stroke-width="0.6"/>

  <!-- 正脊 -->
  <line x1="30" y1="14" x2="66" y2="14" stroke="#282818" stroke-width="1.2"/>

  <!-- 飞檐 -->
  <path d="M16,36 Q14,32 18,30" fill="none" stroke="#505038" stroke-width="1" stroke-linecap="round"/>
  <path d="M80,36 Q82,32 78,30" fill="none" stroke="#505038" stroke-width="1" stroke-linecap="round"/>

  <!-- 门 -->
  <rect x="44" y="56" width="8" height="14" rx="0.5" fill="#3a2010"/>

  <!-- 阶 -->
  <rect x="38" y="74" width="20" height="3" rx="0.3" fill="#d0c8b8"/>

  <!-- 药草架 -->
  <rect x="10" y="44" width="18" height="2" fill="#a09070" opacity="0.5"/>
  <rect x="68" y="44" width="18" height="2" fill="#a09070" opacity="0.5"/>
</svg>
