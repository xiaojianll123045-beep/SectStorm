<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <rect x="0" y="0" width="96" height="96" fill="#8a8278"/>

  <!-- 大院 -->
  <rect x="3" y="26" width="90" height="50" rx="1" fill="none" stroke="#909080" stroke-width="1"/>

  <!-- 左厢 -->
  <rect x="5" y="34" width="20" height="28" rx="0.5" fill="#d0c0a8"/>
  <path d="M3,38 L10,28 L27,38 Q23,37 21,39 L11,39 Q7,37 3,38 Z" fill="#505038" stroke="#383828" stroke-width="0.5"/>
  <circle cx="15" cy="48" r="4" fill="none" stroke="#4080c0" stroke-width="0.3" opacity="0.3"/>

  <!-- 右厢 -->
  <rect x="71" y="34" width="20" height="28" rx="0.5" fill="#d0c0a8"/>
  <path d="M75,38 L86,28 L93,38 Q89,37 87,39 L77,39 Q73,37 75,38 Z" fill="#505038" stroke="#383828" stroke-width="0.5"/>
  <circle cx="81" cy="48" r="4" fill="none" stroke="#4080c0" stroke-width="0.3" opacity="0.3"/>

  <!-- 主殿台基 -->
  <rect x="18" y="30" width="60" height="42" rx="1" fill="#c8c0b0" stroke="#b0a898" stroke-width="0.6"/>

  <!-- 主殿 -->
  <rect x="22" y="36" width="52" height="32" rx="0.5" fill="#d0c0a8" stroke="#b0a088" stroke-width="0.5"/>

  <!-- 竹席 -->
  <rect x="24" y="38" width="48" height="28" rx="0.5" fill="#c8b898"/>
  <line x1="24" y1="44" x2="72" y2="44" stroke="#b8a888" stroke-width="0.2"/>
  <line x1="24" y1="50" x2="72" y2="50" stroke="#b8a888" stroke-width="0.2"/>
  <line x1="24" y1="56" x2="72" y2="56" stroke="#b8a888" stroke-width="0.2"/>

  <!-- 柱 -->
  <rect x="22" y="36" width="2.5" height="32" rx="0.3" fill="#a08060"/>
  <rect x="71.5" y="36" width="2.5" height="32" rx="0.3" fill="#a08060"/>

  <!-- 蒲团(主) -->
  <ellipse cx="48" cy="50" rx="8" ry="4" fill="#b8a060"/>
  <ellipse cx="48" cy="49" rx="6" ry="2.5" fill="#c8b070"/>

  <!-- 蒲团(弟子位) -->
  <ellipse cx="34" cy="50" rx="4" ry="2.5" fill="#b8a060" opacity="0.6"/>
  <ellipse cx="62" cy="50" rx="4" ry="2.5" fill="#b8a060" opacity="0.6"/>

  <!-- 大法阵 -->
  <circle cx="48" cy="50" r="18" fill="none" stroke="#4080c0" stroke-width="0.7" opacity="0.3"/>
  <circle cx="48" cy="50" r="13" fill="none" stroke="#5090d0" stroke-width="0.5" opacity="0.25"/>
  <circle cx="48" cy="50" r="8" fill="none" stroke="#60a0e0" stroke-width="0.4" opacity="0.2"/>
  <path d="M35,50 L61,50 M48,37 L48,63" stroke="#4080c0" stroke-width="0.3" opacity="0.2"/>
  <path d="M38,42 L58,58 M38,58 L58,42" stroke="#4080c0" stroke-width="0.3" opacity="0.15"/>
  <circle cx="48" cy="50" r="5" fill="none" stroke="#80c0ff" stroke-width="0.3" opacity="0.15" stroke-dasharray="2,1.5"/>

  <!-- 灵气光柱 -->
  <ellipse cx="48" cy="34" rx="6" ry="2" fill="#4080c0" opacity="0.1"/>

  <!-- 三檐 -->
  <path d="M10,34 L20,18 L76,18 L86,34 Q80,32 76,36 L20,36 Q16,32 10,34 Z" fill="#504838" stroke="#383028" stroke-width="0.7"/>
  <path d="M16,26 L24,12 L72,12 L80,26 Q74,24 70,28 L26,28 Q22,24 16,26 Z" fill="#403828" stroke="#282018" stroke-width="0.7"/>
  <path d="M22,18 L28,6 L68,6 L74,18 Q68,16 64,20 L32,20 Q28,16 22,18 Z" fill="#302818" stroke="#181008" stroke-width="0.7"/>

  <!-- 正脊 -->
  <line x1="28" y1="6" x2="68" y2="6" stroke="#d4a030" stroke-width="1.5"/>
  <circle cx="48" cy="5" r="1.5" fill="#ffd040"/>

  <!-- 飞檐 -->
  <path d="M10,34 Q8,30 12,28" fill="none" stroke="#504838" stroke-width="1" stroke-linecap="round"/>
  <path d="M86,34 Q88,30 84,28" fill="none" stroke="#504838" stroke-width="1" stroke-linecap="round"/>

  <!-- 院门 -->
  <rect x="43" y="76" width="10" height="2" fill="#3a2010"/>
</svg>
