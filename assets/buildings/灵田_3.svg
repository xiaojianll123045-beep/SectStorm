  <rect x="48" y="24" width="4" height="56" fill="#a09070"/>
  <rect x="70" y="24" width="4" height="56" fill="#a09070"/>
  <rect x="8" y="36" width="84" height="4" fill="#a09070"/>
  <rect x="8" y="52" width="84" height="4" fill="#a09070"/>
  <rect x="8" y="68" width="84" height="4" fill="#a09070"/>

