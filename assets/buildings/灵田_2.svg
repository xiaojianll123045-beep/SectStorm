<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <rect x="0" y="0" width="96" height="96" fill="#8a8278"/>

  <!-- 篱笆 -->
  <rect x="10" y="22" width="76" height="58" rx="1" fill="none" stroke="#a09070" stroke-width="1"/>

  <!-- 田块网格 3x3 -->
  <g>
    <rect x="14" y="28" width="20" height="14" rx="0.5" fill="#6a5040" stroke="#5a4030" stroke-width="0.4"/>
    <rect x="38" y="28" width="20" height="14" rx="0.5" fill="#6a5040" stroke="#5a4030" stroke-width="0.4"/>
    <rect x="62" y="28" width="20" height="14" rx="0.5" fill="#6a5040" stroke="#5a4030" stroke-width="0.4"/>
    <rect x="14" y="46" width="20" height="14" rx="0.5" fill="#6a5040" stroke="#5a4030" stroke-width="0.4"/>
    <rect x="38" y="46" width="20" height="14" rx="0.5" fill="#6a5040" stroke="#5a4030" stroke-width="0.4"/>
    <rect x="62" y="46" width="20" height="14" rx="0.5" fill="#6a5040" stroke="#5a4030" stroke-width="0.4"/>
    <rect x="14" y="64" width="20" height="14" rx="0.5" fill="#6a5040" stroke="#5a4030" stroke-width="0.4"/>
    <rect x="38" y="64" width="20" height="14" rx="0.5" fill="#6a5040" stroke="#5a4030" stroke-width="0.4"/>
    <rect x="62" y="64" width="20" height="14" rx="0.5" fill="#6a5040" stroke="#5a4030" stroke-width="0.4"/>
  </g>

  <!-- 秧苗(带光) -->
  <g>
    <circle cx="24" cy="32" r="2" fill="#50c040" opacity="0.8"/>
    <circle cx="24" cy="32" r="3" fill="#50c040" opacity="0.15"/>
    <circle cx="48" cy="32" r="2" fill="#50c040" opacity="0.8"/>
    <circle cx="72" cy="32" r="2" fill="#50c040" opacity="0.8"/>
    <circle cx="24" cy="50" r="2" fill="#50c040" opacity="0.8"/>
    <circle cx="48" cy="50" r="2.5" fill="#50c040" opacity="0.8"/>
    <circle cx="48" cy="50" r="3.5" fill="#50c040" opacity="0.15"/>
    <circle cx="72" cy="50" r="2" fill="#50c040" opacity="0.8"/>
    <circle cx="24" cy="68" r="2" fill="#50c040" opacity="0.8"/>
    <circle cx="48" cy="68" r="2" fill="#50c040" opacity="0.8"/>
    <circle cx="72" cy="68" r="2" fill="#50c040" opacity="0.8"/>
  </g>

  <!-- 水 -->
  <rect x="14" y="30" width="20" height="2" fill="#4080c0" opacity="0.2"/>
  <rect x="38" y="30" width="20" height="2" fill="#4080c0" opacity="0.2"/>
  <rect x="62" y="30" width="20" height="2" fill="#4080c0" opacity="0.2"/>
  <rect x="14" y="48" width="20" height="2" fill="#4080c0" opacity="0.2"/>
  <rect x="38" y="48" width="20" height="2" fill="#4080c0" opacity="0.2"/>
  <rect x="62" y="48" width="20" height="2" fill="#4080c0" opacity="0.2"/>
  <rect x="14" y="66" width="20" height="2" fill="#4080c0" opacity="0.2"/>
  <rect x="38" y="66" width="20" height="2" fill="#4080c0" opacity="0.2"/>
  <rect x="62" y="66" width="20" height="2" fill="#4080c0" opacity="0.2"/>

  <!-- 田埂(井字形) -->
  <rect x="34" y="28" width="4" height="50" fill="#a09070"/>
  <rect x="58" y="28" width="4" height="50" fill="#a09070"/>
  <rect x="14" y="42" width="68" height="4" fill="#a09070"/>
  <rect x="14" y="60" width="68" height="4" fill="#a09070"/>

  <!-- 水渠 -->
  <rect x="14" y="22" width="68" height="2" fill="#5090c0" opacity="0.3"/>

  <!-- 入口 -->
  <rect x="44" y="80" width="8" height="2" fill="#3a2010"/>

  <!-- 草庐 -->
  <rect x="78" y="56" width="12" height="10" rx="0.5" fill="#c8b090"/>
  <polygon points="76,56 81,50 90,56" fill="#505038" stroke="#383828" stroke-width="0.3"/>
</svg>
