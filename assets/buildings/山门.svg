<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#308040"/>
      <stop offset="100%" stop-color="#206030"/>
    </linearGradient>
    <linearGradient id="pillar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a03030"/>
      <stop offset="30%" stop-color="#d04040"/>
      <stop offset="70%" stop-color="#d04040"/>
      <stop offset="100%" stop-color="#902828"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0b8a8"/>
      <stop offset="100%" stop-color="#a09888"/>
    </linearGradient>
  </defs>

  <!-- 背景天空 -->
  <rect x="0" y="0" width="96" height="96" fill="#d8e8f0"/>

  <!-- 山体 -->
  <path d="M0,60 Q20,40 48,30 Q76,40 96,60 L96,96 L0,96 Z" fill="#607060"/>
  <path d="M0,70 Q24,50 48,42 Q72,50 96,70 L96,96 L0,96 Z" fill="#506050"/>
  <path d="M0,80 Q24,65 48,58 Q72,65 96,80 L96,96 L0,96 Z" fill="#405040"/>

  <!-- 石阶 -->
  <rect x="36" y="80" width="24" height="3" rx="0.5" fill="#b0a898"/>
  <rect x="34" y="83" width="28" height="3" rx="0.5" fill="#a09888"/>
  <rect x="32" y="86" width="32" height="3" rx="0.5" fill="#908878"/>
  <rect x="30" y="89" width="36" height="4" rx="0.5" fill="#807868"/>

  <!-- 左柱 -->
  <rect x="18" y="32" width="8" height="50" rx="1" fill="url(#pillar)" stroke="#802020" stroke-width="0.6"/>

  <!-- 右柱 -->
  <rect x="70" y="32" width="8" height="50" rx="1" fill="url(#pillar)" stroke="#802020" stroke-width="0.6"/>

  <!-- 柱础 -->
  <rect x="16" y="78" width="12" height="4" rx="0.5" fill="#d0c8b8" stroke="#a09888" stroke-width="0.4"/>
  <rect x="68" y="78" width="12" height="4" rx="0.5" fill="#d0c8b8" stroke="#a09888" stroke-width="0.4"/>

  <!-- 两侧矮墙 -->
  <rect x="0" y="60" width="20" height="22" rx="0.5" fill="#c0b098" stroke="#a08870" stroke-width="0.5"/>
  <rect x="76" y="60" width="20" height="22" rx="0.5" fill="#c0b098" stroke="#a08870" stroke-width="0.5"/>

  <!-- 下横梁 -->
  <rect x="16" y="48" width="64" height="4" rx="0.5" fill="#207070" stroke="#105858" stroke-width="0.5"/>

  <!-- 下横梁彩绘 -->
  <rect x="18" y="49" width="60" height="2" fill="#409090" opacity="0.5"/>

  <!-- 上横梁 -->
  <rect x="16" y="36" width="64" height="4" rx="0.5" fill="#207070" stroke="#105858" stroke-width="0.5"/>

  <!-- 斗拱层 -->
  <rect x="16" y="32" width="64" height="4" rx="0.5" fill="#306060" stroke="#184040" stroke-width="0.3"/>
  <path d="M22,32 L22,36 M30,32 L30,36 M38,32 L38,36 M46,32 L46,36 M54,32 L54,36 M62,32 L62,36 M70,32 L70,36" stroke="#409090" stroke-width="0.8"/>

  <!-- 牌匾 -->
  <rect x="32" y="40" width="32" height="8" rx="1" fill="#3a2010" stroke="#1a0e05" stroke-width="0.5"/>

  <!-- 匾文 "宗门" -->
  <text x="48" y="47" text-anchor="middle" font-size="6" fill="#d4a030" font-family="serif">宗门</text>

  <!-- 匾框金边 -->
  <rect x="32" y="40" width="32" height="8" rx="1" fill="none" stroke="#d4a436" stroke-width="0.4"/>

  <!-- 屋顶下檐 -->
  <polygon points="10,32 24,28 72,28 86,32" fill="url(#roof)" stroke="#205020" stroke-width="0.6" stroke-linejoin="round"/>
  <polygon points="14,32 24,29 72,29 82,32" fill="#40a050"/>

  <!-- 屋顶上檐 -->
  <polygon points="14,24 24,16 72,16 82,24" fill="url(#roof)" stroke="#205020" stroke-width="0.6" stroke-linejoin="round"/>
  <polygon points="18,24 24,17 72,17 78,24" fill="#40a050"/>

  <!-- 屋顶瓦楞 -->
  <path d="M24,28 L24,32 M34,27 L34,32 M44,26 L44,32 M54,26 L54,32 M64,27 L64,32 M74,28 L74,32" stroke="#205020" stroke-width="0.3" opacity="0.5"/>
  <path d="M24,16 L24,24 M34,16 L34,24 M44,16 L44,24 M54,16 L54,24 M64,16 L64,24 M74,16 L74,24" stroke="#205020" stroke-width="0.3" opacity="0.5"/>

  <!-- 正脊宝珠 -->
  <circle cx="48" cy="15" r="3" fill="#ffd040" stroke="#d4a030" stroke-width="0.6"/>
  <circle cx="48" cy="15" r="1.5" fill="#ffe880"/>

  <!-- 飞檐翘角饰 -->
  <path d="M10,32 Q6,30 4,28" fill="none" stroke="#308040" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M14,24 Q10,22 8,20" fill="none" stroke="#308040" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M86,32 Q90,30 92,28" fill="none" stroke="#308040" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M82,24 Q86,22 88,20" fill="none" stroke="#308040" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 左松树 -->
  <rect x="5" y="56" width="3" height="8" rx="0.5" fill="#604830"/>
  <circle cx="7" cy="52" r="6" fill="#306030" opacity="0.8"/>
  <circle cx="4" cy="55" r="4" fill="#407040" opacity="0.6"/>
  <circle cx="9" cy="55" r="4" fill="#407040" opacity="0.6"/>

  <!-- 右松树 -->
  <rect x="88" y="58" width="3" height="6" rx="0.5" fill="#604830"/>
  <circle cx="90" cy="54" r="5" fill="#306030" opacity="0.8"/>
  <circle cx="87" cy="56" r="3.5" fill="#407040" opacity="0.6"/>
  <circle cx="93" cy="56" r="3.5" fill="#407040" opacity="0.6"/>

  <!-- 云雾 -->
  <ellipse cx="30" cy="38" rx="8" ry="2" fill="#ffffff" opacity="0.15"/>
  <ellipse cx="66" cy="36" rx="6" ry="1.5" fill="#ffffff" opacity="0.12"/>
  <ellipse cx="48" cy="22" rx="10" ry="2" fill="#ffffff" opacity="0.1"/>
</svg>
