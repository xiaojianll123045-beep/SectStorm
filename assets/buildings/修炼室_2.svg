<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <rect x="0" y="0" width="96" height="96" fill="#8a8278"/>

  <!-- 围墙 -->
  <rect x="6" y="30" width="84" height="42" rx="1" fill="none" stroke="#909080" stroke-width="1"/>

  <!-- 台基 -->
  <rect x="18" y="34" width="60" height="36" rx="1" fill="#c0b8a8" stroke="#a8a090" stroke-width="0.6"/>

  <!-- 屋 -->
  <rect x="22" y="38" width="52" height="28" rx="0.5" fill="#d0c0a8" stroke="#b0a088" stroke-width="0.5"/>

  <!-- 竹席 -->
  <rect x="24" y="40" width="48" height="24" rx="0.5" fill="#c8b898"/>
  <line x1="24" y1="46" x2="72" y2="46" stroke="#b8a888" stroke-width="0.2"/>
  <line x1="24" y1="52" x2="72" y2="52" stroke="#b8a888" stroke-width="0.2"/>
  <line x1="24" y1="58" x2="72" y2="58" stroke="#b8a888" stroke-width="0.2"/>

  <!-- 柱 -->
  <rect x="22" y="38" width="2.5" height="28" rx="0.3" fill="#a08060"/>
  <rect x="71.5" y="38" width="2.5" height="28" rx="0.3" fill="#a08060"/>
  <rect x="35" y="38" width="2" height="28" rx="0.3" fill="#a08060"/>
  <rect x="59" y="38" width="2" height="28" rx="0.3" fill="#a08060"/>

  <!-- 蒲团 -->
  <ellipse cx="48" cy="52" rx="8" ry="4" fill="#b8a060" stroke="#a08850" stroke-width="0.4"/>
  <ellipse cx="48" cy="51" rx="6" ry="2.5" fill="#c8b070"/>

  <!-- 法阵(大) -->
  <circle cx="48" cy="52" r="15" fill="none" stroke="#4080c0" stroke-width="0.6" opacity="0.3"/>
  <circle cx="48" cy="52" r="11" fill="none" stroke="#5080d0" stroke-width="0.5" opacity="0.25"/>
  <circle cx="48" cy="52" r="7" fill="none" stroke="#6090e0" stroke-width="0.4" opacity="0.2"/>
  <path d="M38,52 L58,52 M48,42 L48,62" stroke="#4080c0" stroke-width="0.3" opacity="0.2"/>
  <path d="M40,46 L56,58 M40,58 L56,46" stroke="#4080c0" stroke-width="0.3" opacity="0.15"/>

  <!-- 下檐 -->
  <path d="M10,36 L22,22 L74,22 L86,36 Q80,34 76,38 L20,38 Q16,34 10,36 Z" fill="#505038" stroke="#383828" stroke-width="0.7"/>

  <!-- 上檐 -->
  <path d="M16,28 L26,16 L70,16 L80,28 Q74,26 70,30 L26,30 Q22,26 16,28 Z" fill="#404028" stroke="#282818" stroke-width="0.7"/>

  <!-- 正脊 -->
  <line x1="26" y1="16" x2="70" y2="16" stroke="#282818" stroke-width="1.5"/>
  <path d="M10,36 Q8,32 12,30" fill="none" stroke="#505038" stroke-width="1" stroke-linecap="round"/>
  <path d="M86,36 Q88,32 84,30" fill="none" stroke="#505038" stroke-width="1" stroke-linecap="round"/>

  <!-- 檐下光效 -->
  <rect x="30" y="42" width="36" height="2" fill="#4080c0" opacity="0.08"/>

  <!-- 院门 -->
  <rect x="43" y="72" width="10" height="2" fill="#3a2010"/>
</svg>
